version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gametest
      POSTGRES_PASSWORD: gametest123
      POSTGRES_DB: gametest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gametest"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://gametest:gametest123@postgres:5432/gametest?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 6371
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "6371:6371"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5261:5261"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
